name: Deploy to GitHub Pages

# Publishes the v2/ portfolio at the domain root and bundles the archived
# v1/ portfolio under /v1/. Set Pages source to "GitHub Actions" in repo Settings.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (v2 -> root, v1 -> /v1/)
        run: |
          mkdir -p _site
          cp -r v2/. _site/
          mkdir -p _site/v1
          cp -r v1/. _site/v1/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
